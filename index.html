<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Neon Tic-Tac-Toe</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f111a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Animated Canvas Background */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Container to keep content above background */
        .game-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(25, 28, 41, 0.65);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 8px rgba(0, 242, 254, 0.3));
        }

        #status {
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            background-color: rgba(255, 255, 255, 0.03);
            padding: 10px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .cell {
            background-color: #1e2235;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            user-select: none;
            border: 1px solid rgba(255, 255, 255, 0.02);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        .cell:hover {
            background-color: #282e48;
            transform: scale(1.03);
        }

        /* Neon styling for turns */
        .cell.X { 
            color: #ff4757; 
            text-shadow: 0 0 15px rgba(255, 71, 87, 0.6);
        }
        .cell.O { 
            color: #2ed573; 
            text-shadow: 0 0 15px rgba(46, 213, 115, 0.6);
        }

        #reset-btn {
            margin-top: 25px;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.2);
        }

        #reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
            background: linear-gradient(135deg, #34495e, #2980b9);
        }
        
        #reset-btn:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <!-- Dynamic Animated Background Canvas -->
    <canvas id="bg-canvas"></canvas>

    <div class="game-container">
        <h1>Tic-Tac-Toe</h1>
        <div id="status">Player X's turn</div>

        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <button id="reset-btn">Restart Game</button>
    </div>

    <script>
        /* --- GAME LOGIC --- */
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        const resetBtn = document.getElementById('reset-btn');
        const cells = document.querySelectorAll('.cell');

        let boardState = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        let isGameActive = true;

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        function handleCellClick(e) {
            const clickedCell = e.target;
            if (!clickedCell.classList.contains('cell')) return;
            
            const clickedCellIndex = parseInt(clickedCell.getAttribute('data-index'));

            if (boardState[clickedCellIndex] !== "" || !isGameActive) {
                return;
            }

            updateCell(clickedCell, clickedCellIndex);
            checkResult();
        }

        function updateCell(cell, index) {
            boardState[index] = currentPlayer;
            cell.innerText = currentPlayer;
            cell.classList.add(currentPlayer);
        }

        function checkResult() {
            let roundWon = false;

            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                if (boardState[a] === "" || boardState[b] === "" || boardState[c] === "") continue;
                if (boardState[a] === boardState[b] && boardState[b] === boardState[c]) {
                    roundWon = true;
                    break;
                }
            }

            if (roundWon) {
                statusElement.innerText = `Player ${currentPlayer} Wins! 🎉`;
                statusElement.style.color = currentPlayer === 'X' ? '#ff4757' : '#2ed573';
                isGameActive = false;
                return;
            }

            if (!boardState.includes("")) {
                statusElement.innerText = "It's a Draw! 🤝";
                statusElement.style.color = "#eccc68";
                isGameActive = false;
                return;
            }

            currentPlayer = currentPlayer === "X" ? "O" : "X";
            statusElement.innerText = `Player ${currentPlayer}'s turn`;
            statusElement.style.color = "#a0aec0";
        }

        function resetGame() {
            boardState = ["", "", "", "", "", "", "", "", ""];
            currentPlayer = "X";
            isGameActive = true;
            statusElement.innerText = "Player X's turn";
            statusElement.style.color = "#a0aec0";
            cells.forEach(cell => {
                cell.innerText = "";
                cell.classList.remove('X', 'O');
            });
        }

        boardElement.addEventListener('click', handleCellClick);
        resetBtn.addEventListener('click', resetGame);


        /* --- ANIMATED BACKGROUND LOGIC --- */
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        let particlesArray = [];
        const numberOfParticles = 40;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.color = Math.random() > 0.5 ? 'rgba(0, 242, 254, 0.2)' : 'rgba(46, 213, 115, 0.15)';
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // Teleport back onto screen if they drift off
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
            }
        }

        function initBackground() {
            particlesArray = [];
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateBackground() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateBackground);
        }

        initBackground();
        animateBackground();
    </script>
</body>
</html>
